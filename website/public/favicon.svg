<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Drop shadow -->
  <rect x="10" y="10" width="116" height="116" rx="18" ry="18" fill="#000"/>
  <!-- Yellow background -->
  <rect x="2" y="2" width="116" height="116" rx="18" ry="18" fill="#ffdb02" stroke="#000" stroke-width="5"/>
  <!-- 2x2 grid of letters, each in a fixed-width cell -->
  <!-- Row 1: S I -->
  <text x="40" y="58" text-anchor="middle" font-family="'Lexend Mega','Arial Black',Impact,sans-serif" font-weight="700" font-size="46" fill="#000">S</text>
  <text x="80" y="58" text-anchor="middle" font-family="'Lexend Mega','Arial Black',Impact,sans-serif" font-weight="700" font-size="46" fill="#000">I</text>
  <!-- Row 2: G O -->
  <text x="40" y="104" text-anchor="middle" font-family="'Lexend Mega','Arial Black',Impact,sans-serif" font-weight="700" font-size="46" fill="#000">G</text>
  <text x="80" y="104" text-anchor="middle" font-family="'Lexend Mega','Arial Black',Impact,sans-serif" font-weight="700" font-size="46" fill="#000">O</text>
</svg>
