name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: adopt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Init ktlint
        run: ./sigo init ktlint --ci --version 1.8.0

      - name: Lint
        run: ./sigo lint --all

  build:
    name: Build
    needs: [lint]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: adopt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Copy sample app-env
        run: cp ./.github/ci-app-env.properties ./app-env.properties

      - name: Copy CI google-services.json
        run: cp ./.github/ci-google-services.json ./apps/android/google-services.json

      - name: Build
        run: ./sigo gradle compileDebugKotlin

  build-docker:
    name: Build Docker (API Server)
    needs: [lint]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy sample app-env
        run: cp ./.github/ci-app-env.properties ./app-env.properties

      - name: Build Docker image
        run: docker build -f apps/api/server/Dockerfile -t sigo-api .

  build-worker:
    name: Build Cloudflare Worker
    needs: [lint]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: adopt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Copy sample app-env
        run: cp ./.github/ci-app-env.properties ./app-env.properties

      - name: Compile Kotlin to JS
        run: ./sigo gradle :apps:api:worker:compileKotlinJs

      - name: Install worker dependencies
        working-directory: apps/api/worker
        run: npm install

      - name: Validate worker bundle
        working-directory: apps/api/worker
        run: npx wrangler deploy --dry-run --outdir dist
