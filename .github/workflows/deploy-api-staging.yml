name: Deploy Staging API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "docs/**"
      - "screenshots/**"
      - "LICENSE"
      - "scripts/**"
      - "website/**"

jobs:
  verify:
    name: "Deploy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Initialize
        run: ./sigo api:worker init

      - name: Deploy to Cloudflare
        run: ./sigo api:worker deploy --env staging
        env:
          APP_BACKEND_URL: staging.${{ vars.APP_BACKEND_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
